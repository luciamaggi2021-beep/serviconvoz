<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviconvoz</title>

<!-- Iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<!-- Css -->
<style>
body {
  margin: 0;
  font-family: Nicholas;
}
@font-face{
  font-family: Nicholas;
  src: url('nicholas/Nicholas.ttf');
}
/* ENCABEZADO */
.header {
  background-color: #123a6b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}

/*Menú Lateral*/

#btn-menu {
  display: none;
}

.container-menu {
  position: fixed;
  background-color: #123a6b;
  width: 15%;
  height: 100vh;
  top: 0; left: 0;
  transition: all 500ms ease;
  transform: translateX(-100%);
  z-index: 9999;
}
#btn-menu:checked ~ .container-menu{
  opacity: 1;
  visibility: visible;
  transform: translateX(0%);
}
#btn-menu:checked ~ .container-menu .cont-menu{
  transform: translateX(0%);
}
.cont-menu {
  width: 100%;
  max-width: 250px;
  background: #123a6b;
  height: max(0, 0);
  position: relative;
  color: white;
  transition: all 500ms ease;
}
.cont-menu nav{
  transform:translateY(50%);
  font-size: 25px;
}
.cont-menu nav a{
  display: block;
  text-decoration: none;
  color: white;
  padding: 20px;
  border-left: 5px solid transparent;
  transition: all 500ms ease;
}
.cont-menu nav a:hover{
  border-left: 5px solid white;
  background: #122B4A;
}
.cont-menu p{
  position: absolute;
  top: 10px;
  font-family: Nicholas;
  font-size: 43px;
  cursor: pointer;
}
.cont-menu label {
  position: absolute;
  left: 5px;
  top: 10px;
  font-size: 30px;
  cursor: pointer;
}
.linen1 img{
  width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-220px);
}
.linen2 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-370px);
}
.linen3 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-515px);
}
.linen4 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-660px);
}
.linen1,
.linen2,
.linen3,
.linen4 {
  pointer-events: none;
}
/* LADO IZQUIERDO */

.btn-menu{
  position: absolute;
  left: 20px;
  font-size: 22px;
  cursor: pointer;
}
.left {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-left: 40px;
}

.menu {
  font-size: 22px;
  cursor: pointer;
}

.logo {
  font-size: 20px;
  color: white;
  width: 40px;
  height: 40px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-decoration: none;
}

/* BARRA DE BÚSQUEDA EN EL HEADER - NUEVO ESTILO */
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search {
  font-size: 24px;
  cursor: pointer;
  color: white;
  transition: 0.2s;
}

.search:hover {
  opacity: 0.7;
}

.search-input-header {
  background: white;
  border: none;
  border-radius: 30px;
  padding: 8px 15px;
  font-size: 14px;
  width: 0;
  opacity: 0;
  transition: all 0.3s ease;
  outline: none;
  font-family: Nicholas;
}

.search-input-header.active {
  width: 200px;
  opacity: 1;
  margin-left: 10px;
  padding: 8px 15px;
}

/* CENTRO */
.title {
  text-decoration: none;
  color: white;
  letter-spacing: 7px;
  font-size: 50px;
  font-family: Nicholas;
}

/* LADO DERECHO */
.right {
  display: flex;
  align-items: center;
  gap: 30px;
}

.btn {
  border: 2px solid white;
  padding: 9px 12px;
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn:hover {
  background-color: white;
  color: #123a6b;
}

.icon-link {
  color: white;
  font-size: 30px;
  text-decoration: none;
}

.icon-link:hover {
  opacity: 0.7;
}
</style>
</head>

<body>

<header class="header">

  <!-- IZQUIERDA -->

    <div class="btn-menu">
    <label for="btn-menu" class="fas fa-bars menu"></label>
  </div>

  <div class="left">

   <a href="index.html" class="logo">ISD</a>

    <!-- BARRA DE BÚSQUEDA EN EL HEADER -->
    <div class="search-wrapper">
      <i class="fas fa-search search" id="searchIcon"></i>
      <input type="text" id="searchInput" class="search-input-header" placeholder="Buscar...">
    </div>

  </div>
  <!-- CENTRO -->
<a href="index.html" class="title">Serviconvoz</a>

  <!-- DERECHA -->
  <div class="right">
    <a href="play.html" class="btn">
      <i class="fas fa-play"></i> Escuchar
    </a>

    <a href="https://www.instagram.com/serviliano.diaz/" target="_blank" class="icon-link">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.facebook.com/profile.php?id=100007401407651" target="_blank" class="icon-link">
      <i class="fab fa-facebook-f"></i>
    </a>

  </div>

</header>
<input type="checkbox" id="btn-menu">
<div class="container-menu">
  <div class="cont-menu">
    <nav>
      <a href="programas.html">Programas</a>
      <a href="artículos.html">Articulos</a>
      <a href="noticias.html">Noticias Locales</a>
    </nav>
    <p>Serviconvoz</p>
    <label for="btn-menu" class="fas fa-bars menu"></label>
    <div class="linen1">
      <img src="Lines/line1.png">
    </div>
    <div class="linen2">
      <img src="Lines/line2.png">
    </div>
    <div class="linen3">
      <img src="Lines/line2.png">
    </div>
    <div class="linen4">
      <img src="Lines/line2.png">
    </div>
  </div>
</div>

<script>
  // SCRIPT PARA LA BARRA DE BÚSQUEDA EN EL HEADER
  const searchIcon = document.getElementById('searchIcon');
  const searchInput = document.getElementById('searchInput');
  
  // Al hacer clic en la lupa, mostrar/ocultar el input
  searchIcon.addEventListener('click', function(e) {
    e.stopPropagation();
    searchInput.classList.toggle('active');
    if (searchInput.classList.contains('active')) {
      searchInput.focus();
    }
  });
  
  // Buscar al presionar Enter
  searchInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      const busqueda = searchInput.value.trim();
      if (busqueda !== '') {
        alert('Buscando: ' + busqueda);
        // Aquí puedes poner tu lógica de búsqueda
        // Ejemplo: filtrar contenido, redirigir, etc.
        searchInput.classList.remove('active');
        searchInput.value = '';
      }
    }
  });
  
  // Opcional: cerrar el buscador si se hace clic fuera
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && e.target !== searchIcon) {
      searchInput.classList.remove('active');
      searchInput.value = '';
    }
  });
</script>



</body>
</html>

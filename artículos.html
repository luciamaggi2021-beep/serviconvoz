<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviconvoz</title>

<!-- Iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<!-- Css -->
<style>
body {
  margin: 0;
  font-family: Nicholas;
}
@font-face{
  font-family: Nicholas;
  src: url('nicholas/Nicholas.ttf');
}
/* ENCABEZADO */
.header {
  background-color: #123a6b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}
.np{
  font-size: 50px;
  text-align: center;
  transform: translateX(-25px);
      color: black;
    -webkit-text-stroke: 1px black
}
/*Menú Lateral*/

#btn-menu {
  display: none;
}

.container-menu {
  position: fixed;
  background-color: #123a6b;
  width: 15%;
  height: 100vh;
  top: 0; left: 0;
  transition: all 500ms ease;
  transform: translateX(-100%);
  z-index: 9999;
}
#btn-menu:checked ~ .container-menu{
  opacity: 1;
  visibility: visible;
  transform: translateX(0%);
}
#btn-menu:checked ~ .container-menu .cont-menu{
  transform: translateX(0%);
}
.cont-menu {
  width: 100%;
  max-width: 250px;
  background: #123a6b;
  height: max(0, 0);
  position: relative;
  color: white;
  transition: all 500ms ease;
}
.cont-menu nav{
  transform:translateY(50%);
  font-size: 25px;
}
.cont-menu nav a{
  display: block;
  text-decoration: none;
  color: white;
  padding: 20px;
  border-left: 5px solid transparent;
  transition: all 500ms ease;
}
.cont-menu nav a:hover{
  border-left: 5px solid white;
  background: #122B4A;
}
.cont-menu p{
  position: absolute;
  top: 10px;
  font-family: Nicholas;
  font-size: 43px;
  cursor: pointer;
}
.cont-menu label {
  position: absolute;
  left: 5px;
  top: 10px;
  font-size: 30px;
  cursor: pointer;
}
.linen1 img{
  width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-220px);
}
.linen2 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-370px);
}
.linen3 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-515px);
}
.linen4 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-660px);
}
.linen1,
.linen2,
.linen3,
.linen4 {
  pointer-events: none;
}
/* LADO IZQUIERDO */

.btn-menu{
  position: absolute;
  left: 20px;
  font-size: 22px;
  cursor: pointer;
}
.left {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-left: 40px;
}

.menu {
  font-size: 22px;
  cursor: pointer;
}

.logo {
  font-size: 20px;
  color: white;
  width: 40px;
  height: 40px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-decoration: none;
}

/* BARRA DE BÚSQUEDA EN EL HEADER */
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search {
  font-size: 24px;
  cursor: pointer;
  color: white;
  transition: 0.2s;
}

.search:hover {
  opacity: 0.7;
}

.search-input-header {
  background: white;
  border: none;
  border-radius: 30px;
  padding: 8px 15px;
  font-size: 14px;
  width: 0;
  opacity: 0;
  transition: all 0.3s ease;
  outline: none;
  font-family: Nicholas;
}

.search-input-header.active {
  width: 200px;
  opacity: 1;
  margin-left: 10px;
  padding: 8px 15px;
}

/* CENTRO */
.title {
  text-decoration: none;
  color: white;
  letter-spacing: 7px;
  font-size: 50px;
  font-family: Nicholas;
}

/* LADO DERECHO */
.right {
  display: flex;
  align-items: center;
  gap: 30px;
}

.btn {
  border: 2px solid white;
  padding: 9px 12px;
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn:hover {
  background-color: white;
  color: #123a6b;
}

.icon-link {
  color: white;
  font-size: 30px;
  text-decoration: none;
}

.icon-link:hover {
  opacity: 0.7;
}
/* Contenedor */
.contenedor-cuadros {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-top: 30px;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}

.container1, .container2, .container3 {
  position: relative;
  width: 435px;
  height: 300px;
  background-color: white;
  border-radius: 12px;
  box-shadow: 0 5px 5px rgba(0, 0, 0, 20);
  flex-shrink: 0;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.container1:hover, .container2:hover, .container3:hover {
  transform: translateY(-10px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* Imagen */
.mujertrans {
  width: 100%;
  height: calc(100% - 70px);
  object-fit: cover;
  display: block;
}

/* Marquito (título) */
.marquito {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: 70px;
  background-color: #123a6b;
  border-top: 2px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  box-sizing: border-box;
  text-align: center;
}

.marquito {
  margin: 0;
  font-size: 10px;
  font-weight: bold;
  color: white;
  line-height: 1.4;
}

/* Icono de descarga */
.download-icon {
  position: absolute;
  bottom: 8px;
  right: 12px;
  color: white;
  font-size: 16px;
  text-decoration: none;
  transition: 0.2s;
}

.download-icon:hover {
  opacity: 0.7;
}

/* Responsive */
@media (max-width: 1400px) {
  .container1, .container2, .container3 {
    width: 380px;
    height: 280px;
  }
}

@media (max-width: 1200px) {
  .container1, .container2, .container3 {
    width: 320px;
    height: 260px;
  }
  .marquito h1, .marquito h3 { font-size: 12px; }
}

@media (max-width: 768px) {
  .contenedor-cuadros {
    gap: 20px;
  }
  .container1, .container2, .container3 {
    width: 100%;
    max-width: 350px;
    height: 280px;
  }
}
</style>
</head>

<body>

<header class="header">

  <!-- IZQUIERDA -->

    <div class="btn-menu">
    <label for="btn-menu" class="fas fa-bars menu"></label>
  </div>

  <div class="left">

   <a href="index.html" class="logo">ISD</a>

    <!-- BARRA DE BÚSQUEDA EN EL HEADER -->
    <div class="search-wrapper">
      <i class="fas fa-search search" id="searchIcon"></i>
      <input type="text" id="searchInput" class="search-input-header" placeholder="Buscar...">
    </div>

  </div>
  <!-- CENTRO -->
<a href="index.html" class="title">Serviconvoz</a>

  <!-- DERECHA -->
  <div class="right">
    <a href="play.html" class="btn">
      <i class="fas fa-play"></i> Escuchar
    </a>

    <a href="https://www.instagram.com/serviliano.diaz/" target="_blank" class="icon-link">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.facebook.com/profile.php?id=100007401407651" target="_blank" class="icon-link">
      <i class="fab fa-facebook-f"></i>
    </a>

  </div>

</header>
<input type="checkbox" id="btn-menu">
<div class="container-menu">
  <div class="cont-menu">
    <nav>
      <a href="programas.html">Programas</a>
      <a href="artículos.html">Articulos</a>
      <a href="noticias.html">Noticias Locales</a>
    </nav>
    <p>Serviconvoz</p>
    <label for="btn-menu" class="fas fa-bars menu"></label>
    <div class="linen1">
      <img src="Lines/line1.png">
    </div>
    <div class="linen2">
      <img src="Lines/line2.png">
    </div>
    <div class="linen3">
      <img src="Lines/line2.png">
    </div>
    <div class="linen4">
      <img src="Lines/line2.png">
    </div>
  </div>
</div>

<h3 class="np">
  Nuestros Articulos
</h3>

<div class="contenedor-cuadros" id="contenedor-dinamico">

<script>
  const searchIcon = document.getElementById('searchIcon');
  const searchInput = document.getElementById('searchInput');
  const contenedor = document.getElementById('contenedor-dinamico');
  
  let contenidoOriginal = [];
  
  async function cargarJSON() {
    if (!contenedor) return;
    
    contenedor.innerHTML = '<div style="text-align: center; padding: 40px;">📂 Cargando artículos...</div>';
    
    try {
      const respuesta = await fetch('contenido.json');
      
      if (!respuesta.ok) {
        throw new Error(`No se pudo cargar el archivo. Status: ${respuesta.status}`);
      }
      
      const datos = await respuesta.json();
      contenidoOriginal = datos.articulos;
      
      renderizar(contenidoOriginal);
      
    } catch (error) {
      console.error('Error:', error);
      contenedor.innerHTML = `<div style="text-align: center; padding: 40px; color: red;">
        ❌ Error: ${error.message}<br><br>
        Verificá que el archivo <strong>contenido.json</strong> existe en la misma carpeta.
      </div>`;
    }
  }
  
  function renderizar(items) {
    if (!contenedor) return;
    
    // FORZAR FLEX
    contenedor.style.display = 'flex';
    contenedor.style.justifyContent = 'center';
    contenedor.style.gap = '30px';
    contenedor.style.flexWrap = 'wrap';
    contenedor.style.marginTop = '30px';
    contenedor.style.padding = '0 20px';
    
    if (!items || items.length === 0) {
      contenedor.innerHTML = '<div style="text-align: center; width: 100%; color: #123a6b; padding: 40px; font-size: 18px;">Aun no hemos escrito este articulo＞﹏＜</div>';
      return;
    }
    
    let html = '';
    
    items.forEach(item => {
      const tieneImagen = item.imagen && item.imagen !== '';
      const estaDisponible = item.pdf && item.pdf !== '#';
      
      html += `
        <div class="container${item.id}" style="position: relative; width: 380px; height: 300px; background-color: white; border-radius: 12px; box-shadow: 0 5px 5px rgba(0,0,0,2); flex-shrink: 0; overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease;">
          ${estaDisponible ? `<a href="${item.pdf}" download style="text-decoration: none; display: block; height: 100%;">` : '<div style="cursor: default; height: 100%;">'}
            ${tieneImagen ? 
              `<img class="mujertrans" src="${item.imagen}" alt="${item.titulo}" style="width: 100%; height: calc(100% - 70px); object-fit: cover; display: block;">` : 
              `<div style="height: calc(100% - 70px); background-color: #f0f0f0; display: flex; align-items: center; justify-content: center;">
                 <i class="fas fa-file-alt" style="font-size: 50px; color: #123a6b; opacity: 0.5;"></i>
               </div>`
            }
            <div class="marquito" style="position: absolute; bottom: 0; left: 0; right: 0; width: 100%; height: 70px; background-color: #123a6b; border-top: 2px solid black; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; text-align: center;">
              <h1 style="margin: 0; font-size: 20px; font-weight: bold; color: white; line-height: 1.4;">${item.titulo}</h1>
              ${estaDisponible ? '<i class="fas fa-download" style="position: absolute; bottom: 8px; right: 12px; color: white; font-size: 16px;"></i>' : ''}
            </div>
          ${estaDisponible ? `</a>` : `</div>`}
        </div>
      `;
    });
    
    contenedor.innerHTML = html;
  }
  
  function filtrar(busqueda) {
    const termino = busqueda.toLowerCase().trim();
    
    if (termino === '') {
      renderizar(contenidoOriginal);
      return;
    }
    
    const filtrados = contenidoOriginal.filter(item => {
      return item.titulo.toLowerCase().includes(termino);
    });
    
    renderizar(filtrados);
  }
  
  if (searchIcon && searchInput) {
    searchIcon.addEventListener('click', function(e) {
      e.stopPropagation();
      searchInput.classList.toggle('active');
      if (searchInput.classList.contains('active')) {
        searchInput.focus();
      } else {
        searchInput.value = '';
        filtrar('');
      }
    });
    
    searchInput.addEventListener('input', function(e) {
      filtrar(e.target.value);
    });
    
    document.addEventListener('click', function(e) {
      if (!searchInput.contains(e.target) && e.target !== searchIcon) {
        searchInput.classList.remove('active');
        searchInput.value = '';
        filtrar('');
      }
    });
  }
  
  cargarJSON();
</script>

</body>
</html>

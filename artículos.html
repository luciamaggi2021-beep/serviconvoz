<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviconvoz</title>

<!-- Iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Nicholas;
  background: #f5f5f5;
}
@font-face{
  font-family: Nicholas;
  src: url('nicholas/Nicholas.ttf');
}
/* ENCABEZADO */
.header {
  background-color: #123a6b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}
.np{
  font-size: 50px;
  text-align: center;
  transform: translateX(-25px);
  color: black;
  -webkit-text-stroke: 1px black;
  margin: 30px 0;
}
/*Menú Lateral*/
#btn-menu {
  display: none;
}
.container-menu {
  position: fixed;
  background-color: #123a6b;
  width: 280px;
  height: 100vh;
  top: 0; left: 0;
  transition: all 500ms ease;
  transform: translateX(-100%);
  z-index: 9999;
}
#btn-menu:checked ~ .container-menu{
  transform: translateX(0%);
}
.cont-menu {
  width: 100%;
  max-width: 250px;
  background: #123a6b;
  height: 100%;
  position: relative;
  color: white;
}
.cont-menu nav{
  padding-top: 80px;
  font-size: 25px;
}
.cont-menu nav a{
  display: block;
  text-decoration: none;
  color: white;
  padding: 20px;
  border-left: 5px solid transparent;
  transition: all 500ms ease;
}
.cont-menu nav a:hover{
  border-left: 5px solid white;
  background: #122B4A;
}
.cont-menu p{
  position: absolute;
  top: 10px;
  left: 70px;
  font-family: Nicholas;
  font-size: 32px;
  cursor: default;
}
.cont-menu label {
  position: absolute;
  left: 15px;
  top: 15px;
  font-size: 28px;
  cursor: pointer;
  color: white;
}
.linen1 img, .linen2 img, .linen3 img, .linen4 img {
  width: 80%;
  filter: brightness(0) invert(1);
  opacity: 0.5;
}
.linen1, .linen2, .linen3, .linen4 {
  position: absolute;
  left: 20px;
  pointer-events: none;
}
.linen1 { bottom: 80px; }
.linen2 { bottom: 130px; }
.linen3 { bottom: 180px; }
.linen4 { bottom: 230px; }

/* LADO IZQUIERDO */
.btn-menu{
  font-size: 22px;
  cursor: pointer;
}
.left {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-left: 10px;
}
.logo {
  font-size: 20px;
  color: white;
  width: 40px;
  height: 40px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-decoration: none;
}

/* BARRA DE BÚSQUEDA */
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}
.search {
  font-size: 24px;
  cursor: pointer;
  color: white;
}
.search-input-header {
  background: white;
  border: none;
  border-radius: 30px;
  padding: 8px 15px;
  font-size: 14px;
  width: 0;
  opacity: 0;
  transition: all 0.3s ease;
  outline: none;
  font-family: Nicholas;
}
.search-input-header.active {
  width: 200px;
  opacity: 1;
  margin-left: 10px;
  padding: 8px 15px;
}

/* CENTRO */
.title {
  text-decoration: none;
  color: white;
  letter-spacing: 7px;
  font-size: 40px;
  font-family: Nicholas;
}

/* LADO DERECHO */
.right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.btn {
  border: 2px solid white;
  padding: 8px 12px;
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}
.btn:hover {
  background-color: white;
  color: #123a6b;
}
.icon-link {
  color: white;
  font-size: 24px;
  text-decoration: none;
}

/* Contenedor de artículos */
.contenedor-cuadros {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-top: 30px;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}

.container1, .container2, .container3 {
  position: relative;
  width: 435px;
  height: 300px;
  background-color: white;
  border-radius: 12px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
  flex-shrink: 0;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.container1:hover, .container2:hover, .container3:hover {
  transform: translateY(-10px);
  box-shadow: 0 15px 25px rgba(0,0,0,0.2);
}

/* Imagen */
.articulo-imagen {
  width: 100%;
  height: calc(100% - 70px);
  object-fit: cover;
  display: block;
}

/* Marquito (título) */
.marquito {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: 70px;
  background-color: #123a6b;
  border-top: 3px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  box-sizing: border-box;
  text-align: center;
}

.marquito h1, .marquito h3, .marquito span {
  margin: 0;
  font-size: 14px;
  font-weight: bold;
  color: white;
  line-height: 1.4;
}

/* Icono de descarga */
.download-icon {
  position: absolute;
  bottom: 8px;
  right: 12px;
  color: white;
  font-size: 18px;
  transition: 0.2s;
}

.download-icon:hover {
  opacity: 0.7;
}

/* Responsive */
@media (max-width: 1400px) {
  .container1, .container2, .container3 { width: 380px; height: 280px; }
}
@media (max-width: 1200px) {
  .container1, .container2, .container3 { width: 320px; height: 260px; }
  .marquito h1, .marquito h3, .marquito span { font-size: 12px; }
}
@media (max-width: 768px) {
  .contenedor-cuadros { gap: 20px; }
  .container1, .container2, .container3 { width: 100%; max-width: 350px; height: 280px; }
  .title { font-size: 28px; letter-spacing: 3px; }
  .np { font-size: 32px; transform: none; }
}
</style>
</head>

<body>

<header class="header">
  <div class="btn-menu">
    <label for="btn-menu" class="fas fa-bars menu"></label>
  </div>
  <div class="left">
    <a href="index.html" class="logo">ISD</a>
    <div class="search-wrapper">
      <i class="fas fa-search search" id="searchIcon"></i>
      <input type="text" id="searchInput" class="search-input-header" placeholder="Buscar...">
    </div>
  </div>
  <a href="index.html" class="title">Serviconvoz</a>
  <div class="right">
    <a href="play.html" class="btn"><i class="fas fa-play"></i> Escuchar</a>
    <a href="https://www.instagram.com/serviliano.diaz/" target="_blank" class="icon-link"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/profile.php?id=100007401407651" target="_blank" class="icon-link"><i class="fab fa-facebook-f"></i></a>
  </div>
</header>

<input type="checkbox" id="btn-menu">
<div class="container-menu">
  <div class="cont-menu">
    <nav>
      <a href="programas.html">Programas</a>
      <a href="artículos.html">Articulos</a>
      <a href="noticias.html">Noticias Locales</a>
    </nav>
    <p>Serviconvoz</p>
    <label for="btn-menu" class="fas fa-bars menu"></label>
    <div class="linen1"><img src="Lines/line1.png"></div>
    <div class="linen2"><img src="Lines/line2.png"></div>
    <div class="linen3"><img src="Lines/line2.png"></div>
    <div class="linen4"><img src="Lines/line2.png"></div>
  </div>
</div>

<h3 class="np">Nuestros Articulos</h3>

<div class="contenedor-cuadros">

  <!-- ARTÍCULO 1 -->
  <div class="container1">
    <a href="Nuestros-articulos/Columna de Opinión Discriminación a las mujeres trans en Aregntina durante este siglo.docx" download style="text-decoration: none; display: block; height: 100%;">
      <img class="articulo-imagen" src="Nuestros-articulos/mujertrans.jpg" alt="Mujer Trans">
      <div class="marquito">
        <span>Discriminación a las Mujeres Trans en Argentina durante este Siglo</span>
        <i class="fas fa-download download-icon"></i>
      </div>
    </a>
  </div>

  <!-- ARTÍCULO 2 -->
  <div class="container2">
    <div style="height: calc(100% - 70px); background-color: #f0f0f0; display: flex; align-items: center; justify-content: center;">
      <i class="fas fa-file-alt" style="font-size: 60px; color: #123a6b; opacity: 0.5;"></i>
    </div>
    <div class="marquito">
      <span>Próximamente</span>
    </div>
  </div>

  <!-- ARTÍCULO 3 -->
  <div class="container3">
    <div style="height: calc(100% - 70px); background-color: #f0f0f0; display: flex; align-items: center; justify-content: center;">
      <i class="fas fa-file-alt" style="font-size: 60px; color: #123a6b; opacity: 0.5;"></i>
    </div>
    <div class="marquito">
      <span>Próximamente</span>
    </div>
  </div>

</div>

<script>
  // SCRIPT PARA LA BARRA DE BÚSQUEDA
  const searchIcon = document.getElementById('searchIcon');
  const searchInput = document.getElementById('searchInput');
  
  searchIcon.addEventListener('click', function(e) {
    e.stopPropagation();
    searchInput.classList.toggle('active');
    if (searchInput.classList.contains('active')) {
      searchInput.focus();
    }
  });
  
  searchInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      const busqueda = searchInput.value.trim();
      if (busqueda !== '') {
        alert('Buscando: ' + busqueda);
        searchInput.classList.remove('active');
        searchInput.value = '';
      }
    }
  });
  
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && e.target !== searchIcon) {
      searchInput.classList.remove('active');
      searchInput.value = '';
    }
  });
</script>

</body>
</html>

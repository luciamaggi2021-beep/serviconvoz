<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviconvoz</title>

<!-- Iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<!-- Css -->
<style>
body {
  margin: 0;
  font-family: Nicholas;
}
@font-face{
  font-family: Nicholas;
  src: url('nicholas/Nicholas.ttf');
}
/* ENCABEZADO */
.header {
  background-color: #123a6b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}

/*Menú Lateral*/

#btn-menu {
  display: none;
}

.container-menu {
  position: fixed;
  background-color: #123a6b;
  width: 15%;
  height: 100vh;
  top: 0; left: 0;
  transition: all 500ms ease;
  transform: translateX(-100%);
}
#btn-menu:checked ~ .container-menu{
  opacity: 1;
  visibility: visible;
  transform: translateX(0%);
}
#btn-menu:checked ~ .container-menu .cont-menu{
  transform: translateX(0%);
}
.cont-menu {
  width: 100%;
  max-width: 250px;
  background: #123a6b;
  height: max(0, 0);
  position: relative;
  color: white;
  transition: all 500ms ease;
}
.cont-menu nav{
  transform:translateY(50%);
  font-size: 25px;
}
.cont-menu nav a{
  display: block;
  text-decoration: none;
  color: white;
  padding: 20px;
  border-left: 5px solid transparent;
  transition: all 500ms ease;
}
.cont-menu nav a:hover{
  border-left: 5px solid white;
  background: #122B4A;
}
.cont-menu p{
  position: absolute;
  top: 10px;
  font-family: Nicholas;
  font-size: 43px;
  cursor: pointer;
}
.cont-menu label {
  position: absolute;
  left: 5px;
  top: 10px;
  font-size: 30px;
  cursor: pointer;
}
.linen1 img{
  width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-220px);
}
.linen2 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-370px);
}
.linen3 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-515px);
}
.linen4 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-660px);
}
.linen1,
.linen2,
.linen3,
.linen4 {
  pointer-events: none;
}
/* LADO IZQUIERDO */

.btn-menu{
  position: absolute;
  left: 20px;
  font-size: 22px;
  cursor: pointer;
}
.left {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-left: 40px;
}

.menu {
  font-size: 22px;
  cursor: pointer;
}

.logo {
  font-size: 20px;
  color: white;
  width: 40px;
  height: 40px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-decoration: none;
}

/* BARRA DE BÚSQUEDA EN EL HEADER - NUEVO ESTILO */
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search {
  font-size: 24px;
  cursor: pointer;
  color: white;
  transition: 0.2s;
}

.search:hover {
  opacity: 0.7;
}

.search-input-header {
  background: white;
  border: none;
  border-radius: 30px;
  padding: 8px 15px;
  font-size: 14px;
  width: 0;
  opacity: 0;
  transition: all 0.3s ease;
  outline: none;
  font-family: Nicholas;
}

.search-input-header.active {
  width: 200px;
  opacity: 1;
  margin-left: 10px;
  padding: 8px 15px;
}

/* CENTRO */
.title {
  text-decoration: none;
  color: white;
  letter-spacing: 7px;
  font-size: 50px;
  font-family: Nicholas;
}

/* LADO DERECHO */
.right {
  display: flex;
  align-items: center;
  gap: 30px;
}

.btn {
  border: 2px solid white;
  padding: 9px 12px;
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn:hover {
  background-color: white;
  color: #123a6b;
}

.icon-link {
  color: white;
  font-size: 30px;
  text-decoration: none;
}

.icon-link:hover {
  opacity: 0.7;
}
</style>
</head>

<body>

<header class="header">

  <!-- IZQUIERDA -->

    <div class="btn-menu">
    <label for="btn-menu" class="fas fa-bars menu"></label>
  </div>

  <div class="left">

   <a href="index.html" class="logo">ISD</a>

    <!-- BARRA DE BÚSQUEDA EN EL HEADER -->
    <div class="search-wrapper">
      <i class="fas fa-search search" id="searchIcon"></i>
      <input type="text" id="searchInput" class="search-input-header" placeholder="Buscar...">
    </div>

  </div>
  <!-- CENTRO -->
<a href="index.html" class="title">Serviconvoz</a>

  <!-- DERECHA -->
  <div class="right">
    <a href="play.html" class="btn">
      <i class="fas fa-play"></i> Escuchar
    </a>

    <a href="https://www.instagram.com/serviliano.diaz/" target="_blank" class="icon-link">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.facebook.com/profile.php?id=100007401407651" target="_blank" class="icon-link">
      <i class="fab fa-facebook-f"></i>
    </a>

  </div>

</header>
<input type="checkbox" id="btn-menu">
<div class="container-menu">
  <div class="cont-menu">
    <nav>
      <a href="programas.html">Programas</a>
      <a href="artículos.html">Articulos</a>
      <a href="noticias.html">Noticias Locales</a>
    </nav>
    <p>Serviconvoz</p>
    <label for="btn-menu" class="fas fa-bars menu"></label>
    <div class="linen1">
      <img src="Lines/line1.png">
    </div>
    <div class="linen2">
      <img src="Lines/line2.png">
    </div>
    <div class="linen3">
      <img src="Lines/line2.png">
    </div>
    <div class="linen4">
      <img src="Lines/line2.png">
    </div>
  </div>

</div>
<!-- Elfsight Audio Player | Untitled Audio Player -->
<script src="https://elfsightcdn.com/platform.js" async></script>
<div class="elfsight-app-13dcc2c5-440c-49f4-8cae-6bf16ceee970" data-elfsight-app-lazy></div>

<script>
  const searchIcon = document.getElementById('searchIcon');
  const searchInput = document.getElementById('searchInput');
  
  let todosLosArticulos = [];
  let resultadosDiv = null;
  
  // Crear la ventana flotante de resultados
  function crearVentanaResultados() {
    if (document.getElementById('resultados-flotantes')) return;
    
    const div = document.createElement('div');
    div.id = 'resultados-flotantes';
    div.style.cssText = `
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-height: 400px;
      overflow-y: auto;
      z-index: 10000;
      display: none;
      margin-top: 10px;
      border: 1px solid #ddd;
    `;
    
    const wrapper = document.querySelector('.search-wrapper');
    if (wrapper) {
      wrapper.style.position = 'relative';
      wrapper.appendChild(div);
    } else {
      document.body.appendChild(div);
    }
    
    return div;
  }
  
  // Cargar artículos desde JSON
  async function cargarArticulos() {
    try {
      const respuesta = await fetch('contenido.json');
      const datos = await respuesta.json();
      todosLosArticulos = datos.articulos || [];
      console.log('📦 Artículos cargados:', todosLosArticulos.length);
    } catch (error) {
      console.error('Error:', error);
      todosLosArticulos = [
        { id: 1, titulo: "Discriminación a las Mujeres Trans en Argentina durante este Siglo", imagen: "Nuestros-articulos/mujertrans.jpg", pdf: "Nuestros-articulos/archivo.docx" },
        { id: 2, titulo: "Próximamente - Nuevo Artículo", imagen: "", pdf: "#" },
        { id: 3, titulo: "Próximamente - Nueva Columna", imagen: "", pdf: "#" }
      ];
    }
  }
  
  // Mostrar resultados en la ventana flotante
  function mostrarResultados(busqueda) {
    resultadosDiv = resultadosDiv || crearVentanaResultados();
    
    const termino = busqueda.toLowerCase().trim();
    
    if (termino === '') {
      resultadosDiv.style.display = 'none';
      return;
    }
    
    const filtrados = todosLosArticulos.filter(item => {
      return item.titulo.toLowerCase().includes(termino);
    });
    
    if (filtrados.length === 0) {
      resultadosDiv.innerHTML = `
        <div style="padding: 20px; text-align: center; color: #999;">
          Aun no hemos escrito este articulo ＞﹏＜ "${busqueda}"
        </div>
      `;
      resultadosDiv.style.display = 'block';
      return;
    }
    
    let html = '';
    filtrados.forEach(item => {
      const tieneImagen = item.imagen && item.imagen !== '';
      const estaDisponible = item.pdf && item.pdf !== '#';
      
      html += `
        <div style="display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; transition: background 0.2s; cursor: pointer; hover:background: #f5f5f5;">
          ${estaDisponible ? `<a href="${item.pdf}" download style="text-decoration: none; display: flex; align-items: center; width: 100%; color: inherit;">` : '<div style="display: flex; align-items: center; width: 100%;">'}
            ${tieneImagen ? 
              `<img src="${item.imagen}" alt="${item.titulo}" style="width: 70px; height: 70px; object-fit: cover; border-radius: 8px; margin-right: 15px;">` : 
              `<div style="width: 70px; height: 70px; background-color: #123a6b; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 15px;">
                 <i class="fas fa-file-alt" style="color: white; font-size: 20px;"></i>
               </div>`
            }
            <div style="flex: 1;">
              <h4 style="margin: 0 0 5px 0; font-size: 16px; color: #123a6b;">${item.titulo}</h4>
              <span style="font-size: 15px; color: #666;">${estaDisponible ? 'Por: Lucia Tulian Amuchastegui' : 'Proximamente'}</span>
            </div>
            ${estaDisponible ? '<i class="fas fa-download" style="color: #123a6b;"></i>' : ''}
          ${estaDisponible ? `</a>` : `</div>`}
        </div>
      `;
    });
    
    resultadosDiv.innerHTML = html;
    resultadosDiv.style.display = 'block';
    
    // Agregar hover a los elementos
    resultadosDiv.querySelectorAll('div').forEach(el => {
      el.addEventListener('mouseenter', () => el.style.backgroundColor = '#f5f5f5');
      el.addEventListener('mouseleave', () => el.style.backgroundColor = '');
    });
  }
  
  // Ocultar resultados
  function ocultarResultados() {
    if (resultadosDiv) {
      resultadosDiv.style.display = 'none';
    }
  }
  
  // Eventos de la barra de búsqueda
  if (searchIcon && searchInput) {
    searchIcon.addEventListener('click', function(e) {
      e.stopPropagation();
      searchInput.classList.toggle('active');
      if (searchInput.classList.contains('active')) {
        searchInput.focus();
      } else {
        searchInput.value = '';
        ocultarResultados();
      }
    });
    
    // Búsqueda en vivo mientras escribe
    searchInput.addEventListener('input', function(e) {
      mostrarResultados(e.target.value);
    });
    
    searchInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        mostrarResultados(searchInput.value);
      }
    });
    
    // Cerrar al hacer clic fuera
    document.addEventListener('click', function(e) {
      if (resultadosDiv && !searchInput.contains(e.target) && searchIcon !== e.target && !resultadosDiv.contains(e.target)) {
        searchInput.classList.remove('active');
        searchInput.value = '';
        ocultarResultados();
      }
    });
  }
  
  // Cargar artículos al iniciar
  cargarArticulos();
</script>



</body>
</html>

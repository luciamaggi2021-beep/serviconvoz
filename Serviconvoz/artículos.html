<!-- Css -->
<style>
body {
  margin: 0;
  font-family: Nicholas;
}
@font-face{
  font-family: Nicholas;
  src: url('nicholas/Nicholas.ttf');
}
/* ENCABEZADO */
.header {
  background-color: #123a6b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
}
.np{
  font-size: 50px;
  text-align: center;
  transform: translateX(-25px);
      color: black;
    -webkit-text-stroke: 1px black
}
/*Menú Lateral*/

#btn-menu {
  display: none;
}

.container-menu {
  position: fixed;
  background-color: #123a6b;
  width: 15%;
  height: 100vh;
  top: 0; left: 0;
  transition: all 500ms ease;
  transform: translateX(-100%);
  z-index: 9999;
}
#btn-menu:checked ~ .container-menu{
  opacity: 1;
  visibility: visible;
  transform: translateX(0%);
}
#btn-menu:checked ~ .container-menu .cont-menu{
  transform: translateX(0%);
}
.cont-menu {
  width: 100%;
  max-width: 250px;
  background: #123a6b;
  height: max(0, 0);
  position: relative;
  color: white;
  transition: all 500ms ease;
}
.cont-menu nav{
  transform:translateY(50%);
  font-size: 25px;
}
.cont-menu nav a{
  display: block;
  text-decoration: none;
  color: white;
  padding: 20px;
  border-left: 5px solid transparent;
  transition: all 500ms ease;
}
.cont-menu nav a:hover{
  border-left: 5px solid white;
  background: #122B4A;
}
.cont-menu p{
  position: absolute;
  top: 10px;
  font-family: Nicholas;
  font-size: 43px;
  cursor: pointer;
}
.cont-menu label {
  position: absolute;
  left: 5px;
  top: 10px;
  font-size: 30px;
  cursor: pointer;
}
.linen1 img{
  width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-220px);
}
.linen2 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-370px);
}
.linen3 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-515px);
}
.linen4 img {
  width: 100%;
  display: block;
  margin: 0 auto 10px auto;
  filter: brightness(0) invert(1);
  transform: translateY(-660px);
}
.linen1,
.linen2,
.linen3,
.linen4 {
  pointer-events: none;
}
/* LADO IZQUIERDO */

.btn-menu{
  position: absolute;
  left: 20px;
  font-size: 22px;
  cursor: pointer;
}
.left {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-left: 40px;
}

.menu {
  font-size: 22px;
  cursor: pointer;
}

.logo {
  font-size: 20px;
  color: white;
  width: 40px;
  height: 40px;
  border: 2px solid white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  text-decoration: none;
}

/* BARRA DE BÚSQUEDA EN EL HEADER */
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.search {
  font-size: 24px;
  cursor: pointer;
  color: white;
  transition: 0.2s;
}

.search:hover {
  opacity: 0.7;
}

.search-input-header {
  background: white;
  border: none;
  border-radius: 30px;
  padding: 8px 15px;
  font-size: 14px;
  width: 0;
  opacity: 0;
  transition: all 0.3s ease;
  outline: none;
  font-family: Nicholas;
}

.search-input-header.active {
  width: 200px;
  opacity: 1;
  margin-left: 10px;
  padding: 8px 15px;
}

/* CENTRO */
.title {
  text-decoration: none;
  color: white;
  letter-spacing: 7px;
  font-size: 50px;
  font-family: Nicholas;
}

/* LADO DERECHO */
.right {
  display: flex;
  align-items: center;
  gap: 30px;
}

.btn {
  border: 2px solid white;
  padding: 9px 12px;
  color: white;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
}

.btn:hover {
  background-color: white;
  color: #123a6b;
}

.icon-link {
  color: white;
  font-size: 30px;
  text-decoration: none;
}

.icon-link:hover {
  opacity: 0.7;
}
/* Contenedor */
.contenedor-cuadros {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
  margin-top: 30px;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}

.container1, .container2, .container3 {
  position: relative;
  width: 435px;
  height: 300px;
  background-color: white;
  border-radius: 12px;
  box-shadow: 0 5px 5px rgba(0, 0, 0, 20);
  flex-shrink: 0;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.container1:hover, .container2:hover, .container3:hover {
  transform: translateY(-10px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* Imagen */
.mujertrans {
  width: 100%;
  height: calc(100% - 70px);
  object-fit: cover;
  display: block;
}

/* Marquito (título) */
.marquito {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  height: 70px;
  background-color: #123a6b;
  border-top: 2px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  box-sizing: border-box;
  text-align: center;
}

.marquito {
  margin: 0;
  font-size: 10px;
  font-weight: bold;
  color: white;
  line-height: 1.4;
}

/* Icono de descarga */
.download-icon {
  position: absolute;
  bottom: 8px;
  right: 12px;
  color: #123a6b;
  font-size: 16px;
  text-decoration: none;
  transition: 0.2s;
}

.download-icon:hover {
  opacity: 0.7;
}

/* Responsive */
@media (max-width: 1400px) {
  .container1, .container2, .container3 {
    width: 380px;
    height: 280px;
  }
}

@media (max-width: 1200px) {
  .container1, .container2, .container3 {
    width: 320px;
    height: 260px;
  }
  .marquito h1, .marquito h3 { font-size: 12px; }
}

@media (max-width: 768px) {
  .contenedor-cuadros {
    gap: 20px;
  }
  .container1, .container2, .container3 {
    width: 100%;
    max-width: 350px;
    height: 280px;
  }
}
</style>
</head>

<body>

<script>
  // SCRIPT PARA LA BARRA DE BÚSQUEDA EN EL HEADER
  const searchIcon = document.getElementById('searchIcon');
  const searchInput = document.getElementById('searchInput');
  
  // Al hacer clic en la lupa, mostrar/ocultar el input
  searchIcon.addEventListener('click', function(e) {
    e.stopPropagation();
    searchInput.classList.toggle('active');
    if (searchInput.classList.contains('active')) {
      searchInput.focus();
    }
  });
  
  // Buscar al presionar Enter
  searchInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      const busqueda = searchInput.value.trim();
      if (busqueda !== '') {
        alert('Buscando: ' + busqueda);
        // Aquí puedes poner tu lógica de búsqueda
        // Ejemplo: filtrar contenido, redirigir, etc.
        searchInput.classList.remove('active');
        searchInput.value = '';
      }
    }
  });
  
  // Opcional: cerrar el buscador si se hace clic fuera
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && e.target !== searchIcon) {
      searchInput.classList.remove('active');
      searchInput.value = '';
    }
  });
</script>

<h3 class="np">Nuestros Articulos</h3>

<div class="contenedor-cuadros" id="contenedor-articulos">
  <!-- Los artículos se cargan solos -->
</div>

<script>
  // SCRIPT DE BÚSQUEDA (el que ya tenés)
  const searchIcon = document.getElementById('searchIcon');
  const searchInput = document.getElementById('searchInput');
  
  searchIcon.addEventListener('click', function(e) {
    e.stopPropagation();
    searchInput.classList.toggle('active');
    if (searchInput.classList.contains('active')) {
      searchInput.focus();
    }
  });
  
  searchInput.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      const busqueda = searchInput.value.trim();
      if (busqueda !== '') {
        alert('Buscando: ' + busqueda);
        searchInput.classList.remove('active');
        searchInput.value = '';
      }
    }
  });
  
  document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target) && e.target !== searchIcon) {
      searchInput.classList.remove('active');
      searchInput.value = '';
    }
  });

  // ========== SCRIPT PARA LOS ARTÍCULOS (agregá esto al final) ==========
  const articulos = [
    {
      id: 1,
      titulo: "Discriminación a las Mujeres Trans en Argentina durante este Siglo",
      imagen: "Nuestros-articulos/mujertrans.jpg",
      pdf: "Nuestros-articulos/Columna de Opinión Discriminación a las mujeres trans en Aregntina durante este siglo.docx",
      disponible: true
    },
    {
      id: 2,
      titulo: "Próximamente - Nuevo Artículo",
      imagen: "",
      pdf: "#",
      disponible: false
    },
    {
      id: 3,
      titulo: "Próximamente - Nueva Columna",
      imagen: "",
      pdf: "#",
      disponible: false
    }
  ];

  function mostrarArticulos() {
    const contenedor = document.getElementById('contenedor-articulos');
    if (!contenedor) return;
    
    contenedor.innerHTML = '';
    
    articulos.forEach(articulo => {
      const tieneImagen = articulo.imagen && articulo.imagen !== '';
      const estaDisponible = articulo.disponible;
      
      let html = `<div class="container${articulo.id}">`;
      
      if (estaDisponible) {
        html += `<a href="${articulo.pdf}" download style="text-decoration: none;">`;
      } else {
        html += `<div style="cursor: default;">`;
      }
      
      if (tieneImagen && estaDisponible) {
        html += `<img class="mujertrans" src="${articulo.imagen}" alt="${articulo.titulo}">`;
      } else if (tieneImagen && !estaDisponible) {
        html += `<img class="mujertrans" src="${articulo.imagen}" alt="${articulo.titulo}" style="opacity: 0.5;">`;
      } else {
        html += `<div style="height: calc(100% - 70px); background-color: #f0f0f0; display: flex; align-items: center; justify-content: center;">
                  <i class="fas fa-file-alt" style="font-size: 50px; color: #123a6b; opacity: 0.5;"></i>
                </div>`;
      }
      
      html += `<div class="marquito">
                <h1>${articulo.titulo}</h1>
                ${estaDisponible ? '<i class="fas fa-download download-icon"></i>' : '<i class="fas fa-clock download-icon" style="opacity: 0.5;"></i>'}
              </div>`;
      
      if (estaDisponible) {
        html += `</a>`;
      } else {
        html += `</div>`;
      }
      
      html += `</div>`;
      contenedor.innerHTML += html;
    });
  }
  
  mostrarArticulos();
</script>
